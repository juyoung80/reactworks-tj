<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <style>
        .container {
            display: flex;
            flex-direction: row; /* 아이템을 가로 방향으로 배치 */
            /*flex-direction: column; /* 아이템을 세로 방향으로 배치 */

            /* 주축의 정렬 방법 */
            justify-content: flex-start; /* 가로 방향으로 시작위치에 정렬 */
            justify-content: space-between; /* 가로 방향으로 아이템 간에 공간을 균등하게 배치 */
            justify-content: space-around; /* 가로 방향으로 아이템 주위에 공간을 균등하게 배치 */
            justify-content: center; /* 가로 방향으로 중앙에 정렬 */
            gap:16px;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: lightcoral;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box item1">1</div>
        <div class="box item2">2</div>
        <div class="box item3">3</div>
        <div class="box item4">4</div>
    </div>
</body>
</html>
