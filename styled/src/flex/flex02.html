<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 예제</title>
    <style>
        .container {
            width:400px;
            height:400px;
            border: 1px solid #000;
            display: flex;
            gap:16px;
            align-items:center; /* 세로 방향으로 중앙에 정렬 */
            align-items:start; /* 세로 방향으로 위쪽에 정렬 */
            align-items:end; /* 세로 방향으로 아래쪽에 정렬 */
            flex-direction: row-reverse; /* 아이템을 가로 방향으로 배치, 역순으로 배치 */

            justify-content: space-around; /* 가로 방향으로 아이템 주위에 공간을 균등하게 배치 */
            justify-content: space-between; /* 가로 방향으로 아이템 간에 공간을 균등하게 배치 */

        }
        .box {
            width: 60px;
            height: 60px;
            background-color: skyblue;
        }   
        p{
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
</body>
</html>
