<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 관련 예제</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h1{color:blue;}
        h2{color:green;}
        p{font-family: "바탕체"; font-size: 1.2em;}
        .p1{background-color: yellow; line-height: 2;}
        .p2{background-color: skyblue; line-height: 1.5;}
    </style>
</head>
<body>
    <h1>세계 10대 푸드</h1>
    <h2>마늘(garlic)</h2>
    <p class="p1">
        일해백리(一害百利)는 마늘의 별명이다. 한가지 해가 있고 백가지 이로움이 있다는 뜻이다.<br/>
        그 한가지 해란, 아린 맛으로 인해 위에 부담을 준다는 것이다.
    </p>
    <p class="p2">
        마늘 특유의 아린 맛은  알라신이라는 성분 때문으로 살균 및 항균 작용을 하며,<br/>
        마늘에 들어 있는 아연이 피로 회복에 도움을 준다.
    </p>
</body>
</html>
