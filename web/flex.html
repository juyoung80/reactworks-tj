<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 속성 예제</title>
    <style>
        #container{
            display: flex; /* 부모 요소에 flex 속성을 적용 */
        }
        .box1, .box2, .box3{
            width: 100px;
            height: 100px;
            background-color:#00f;
            margin:20px;
        }
    </style>
</head>
<body>
    <!-- flex 사용시 부모, 자식 요소 태그 -->
     <div id="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
     </div>
</body>
</html>
