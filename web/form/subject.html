<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청 폼 만들기</title>
    <link rel="stylesheet" href="../css/main.css">       
</head>
<body>
    <div class="wrap">
        <form action="#" method="post">
            <fieldset>
                <legend>수강신청 폼</legend>
                <ul>
                    <li>
                        <label for="cid">학과번호</label>
                        <input type="text" id="cid" name="cid" autofocus required>
                        
                    </li>
                    <li>
                        <label for="sname">이름</label>
                        <input type="text" id="sname" name="sname" value="우영우" readonly>
                    </li>
                    <li>
                        <label for="major">학과</label>
                            <select id="major" name="major" onchange="selectMajor()">
                                <option value="">학과 선택</option>
                                <option value="컴퓨터공학과">컴퓨터공학과</option>
                                <option value="전자공학과">전자공학과</option>
                                <option value="기계공학과">기계공학과</option>
                            </select>                        
                    </li>
                </ul>
            </fieldset>
        </form>
        <button type="submit">신청</button>
        <button type="reset">취소</button>
    </div>
</body>

<script>
    function selectMajor() {
        //선택 목록 요소의 접근
        const majorSelect = document.getElementById('major').value;
       alert(`${majorSelect}가 선택되었습니다.`);
    }   
</script>
</html>
