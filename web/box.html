<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델</title>
    <style>
        .box1{
            width: 200px;
            height: 100px;
            background-color: lightcoral;
            margin: 20px; /* 상하 마진은 10px, 좌우 마진은 20px */
            padding: 20px;
        }
        .box2{
            width: 50%;
            height: 100px;
            background-color: lightgreen;
            margin: 10px 20px;
        }
        .box3{
            width: 200px;
            height: 100px;
            background-color: skyblue;
            margin: 20px 0px; /* 상하 마진은 20px, 좌우 마진은 0px */
        }
    </style>
</head>
<body>
    <div class="box1">패딩(padding)이란 콘텐츠 영역과 테두리 사이의 여백을 말합니다.</div>
    <div class="box2">패딩(padding)이란 콘텐츠 영역과 테두리 사이의 여백을 말합니다.</div>
    <div class="box3">패딩(padding)이란 콘텐츠 영역과 테두리 사이의 여백을 말합니다.</div>
</body>
</html>
