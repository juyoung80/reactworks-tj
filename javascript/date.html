<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>date 객체</title>
</head>
<body>
        <script>
        //현재 날짜와 시간 정보가 담긴 date 객체 생성
        const now = new Date();
        console.log('현재 날짜와 시간:', now);

        let time = now.toLocaleString();//날짜와 시간
        time = now.toLocaleDateString();//날짜
        time = now.toLocaleTimeString(); //시간
        console.log('현재 날짜와 시간:', time);       

        

        //날짜
        console.log('연도:', now.getFullYear());
        console.log('월:', now.getMonth() + 1); // 월은 0부터 시작하므로 1을 더해줍니다.
        console.log('일:', now.getDate());

        //시간
        console.log('시:', now.getHours());     
        console.log('분:', now.getMinutes());
        console.log('초:', now.getSeconds());
        

        </script>
    
</body>
</html>
